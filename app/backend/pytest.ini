[pytest]
# Pytest configuration for NewsAnalyzer backend tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum Python version
minversion = 3.8

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Markers for categorizing tests
markers =
    unit: Unit tests (fast, no I/O)
    integration: Integration tests (may require external services)
    slow: Slow tests
    asyncio: Tests using async/await

# Asyncio mode
asyncio_mode = auto

# Coverage options (if pytest-cov is installed)
# addopts = --cov=adapters --cov=core --cov-report=html --cov-report=term

# Log CLI output
log_cli = false
log_cli_level = INFO
